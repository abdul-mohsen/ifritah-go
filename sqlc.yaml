version: "2"
sql:
  - engine : "mysql"
    queries: "pkg/db/queries"
    schema: "pkg/db/schema"
    gen:
      go:
        package: "db"
        out: "pkg/db/gen"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "varchar"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "int32"
            nullable: true
            go_type:
              type: "int32"
              pointer: true
          - db_type: "datetime"
            nullable: true
            go_type:
              import : "time"
              type: "Time"
              pointer: true
          - db_type: "timestamp"
            nullable: true
            go_type:
              import : "time"
              type: "Time"
              pointer: true
          - db_type: "date"
            nullable: true
            go_type:
              import : "time"
              type: "Time"
              pointer: true
          - db_type: "time"
            nullable: true
            go_type:
              import : "time"
              type: "Time"
              pointer: true
